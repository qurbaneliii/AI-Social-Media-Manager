apiVersion: apps/v1
kind: Deployment
metadata:
  name: time-optimization
  labels:
    app: time-optimization
spec:
  replicas: 2
  selector:
    matchLabels:
      app: time-optimization
  template:
    metadata:
      labels:
        app: time-optimization
    spec:
      containers:
        - name: time-optimization
          image: ghcr.io/qurbaneliii/aria-time-optimization:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: aria-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: time-optimization
spec:
  selector:
    app: time-optimization
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
