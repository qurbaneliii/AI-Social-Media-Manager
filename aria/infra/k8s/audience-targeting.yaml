apiVersion: apps/v1
kind: Deployment
metadata:
  name: audience-targeting
  labels:
    app: audience-targeting
spec:
  replicas: 2
  selector:
    matchLabels:
      app: audience-targeting
  template:
    metadata:
      labels:
        app: audience-targeting
    spec:
      containers:
        - name: audience-targeting
          image: ghcr.io/qurbaneliii/aria-audience-targeting:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: aria-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: audience-targeting
spec:
  selector:
    app: audience-targeting
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
