name: Deploy Frontend and Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build_frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aria-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: aria-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static frontend
        env:
          NEXT_PUBLIC_IS_STATIC: "true"
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          export NEXT_PUBLIC_API_BASE_URL="${NEXT_PUBLIC_API_BASE_URL:-https://example.com}"
          export OPENAI_API_KEY="${OPENAI_API_KEY:-dummy-openai-key}"
          export JWT_SECRET="${JWT_SECRET:-dummy-jwt-secret}"

          # GitHub Pages static export cannot include force-dynamic route handlers.
          sed -i 's/export const dynamic = "force-dynamic";/export const dynamic = "force-static";/g' app/api/auth/login/route.ts
          sed -i 's/export const dynamic = "force-dynamic";/export const dynamic = "force-static";/g' app/api/auth/register/route.ts
          sed -i 's/export const dynamic = "force-dynamic";/export const dynamic = "force-static";/g' app/api/auth/me/route.ts
          sed -i 's/export const dynamic = "force-dynamic";/export const dynamic = "force-static";/g' app/api/auth/logout/route.ts

          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./aria-frontend/out

  deploy_frontend:
    runs-on: ubuntu-latest
    needs: build_frontend
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy_backend:
    runs-on: ubuntu-latest
    needs: deploy_frontend
    steps:
      - name: Trigger Render backend deploy (if configured)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set; skipping backend deploy trigger."
            exit 0
          fi

          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
