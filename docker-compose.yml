# Canonical local/Codespaces runtime stack.

networks:
  aria-net:
    driver: bridge

volumes:
  postgres-data:

services:
  api:
    build:
      context: ./aria
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      redpanda:
        condition: service_started
      minio:
        condition: service_started
      temporal:
        condition: service_started
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - aria-net

  worker:
    build:
      context: ./aria
      dockerfile: Dockerfile
    # Tune CELERY_WORKER_CONCURRENCY in .env for low-memory machines or higher-throughput workloads.
    command: celery -A app.tasks worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      redpanda:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - aria-net

  temporal-worker:
    build:
      context: ./aria
      dockerfile: Dockerfile
    command: python -m temporal.worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      temporal:
        condition: service_started
    networks:
      - aria-net

  frontend:
    build:
      context: ./aria-frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_started
    environment:
      DATABASE_URL: ${FRONTEND_DATABASE_URL:-postgresql://aria:aria@postgres:5432/aria}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    networks:
      - aria-net

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aria}
      POSTGRES_DB: ${POSTGRES_DB:-aria}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - aria-net

  redis:
    image: redis:7.2.4-alpine
    ports:
      - "6379:6379"
    networks:
      - aria-net

  redpanda:
    image: redpandadata/redpanda:v24.1.8
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --check=false
    ports:
      - "9092:9092"
    networks:
      - aria-net

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-aria}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-aria}
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_started
    ports:
      - "7233:7233"
    networks:
      - aria-net

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - aria-net
