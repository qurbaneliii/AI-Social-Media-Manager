apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-orchestration
  labels:
    app: llm-orchestration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-orchestration
  template:
    metadata:
      labels:
        app: llm-orchestration
    spec:
      containers:
        - name: llm-orchestration
          image: ghcr.io/qurbaneliii/aria-llm-orchestration:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: aria-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: llm-orchestration
spec:
  selector:
    app: llm-orchestration
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
